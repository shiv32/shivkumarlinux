<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Shiv Kumar</title>
  <link href="style.css" rel="stylesheet" type="text/css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-menu" id="mnav">
        <li><a href="index.html">Home</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="Contact.html">Contact</a></li>
        <li><a href="https://www.youtube.com/@CppCraft" target="_blank">YouTube</a></li>
        <li><a href="https://github.com/shiv32" target="_blank">GitHub</a></li>
        <li><a href="https://en.cppreference.com/w/" target="_blank">C++</a></li>
        <li><a href="https://www.google.com/" target="_blank">Google</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <section class="hero">
      <h1>Contact</h1>
    </section>

    <section class="content">
      <p>Feel free to reach out! I'd love to hear from you.</p>
      
      <h2>Email</h2>
      <p><a href="mailto:info.shivcpp@gmail.com">info.shivcpp@gmail.com</a></p>

      <h2>Connect With Me</h2>
      <p>You can also connect with me on professional networks for more information about my work and experience.</p>
    </section>
  </main>

  <footer class="footer">
    <p id="mip"></p>
    <p id="mdatetime"></p>
  </footer>

  <script src="js/logic.js"></script>
  <script>
    // Inline initialization for hamburger menu and footer data
    window.addEventListener('load', function() {
      const hamburger = document.getElementById('hamburger');
      const navMenu = document.getElementById('mnav');

      if (hamburger && navMenu) {
        hamburger.addEventListener('click', function (e) {
          e.stopPropagation();
          hamburger.classList.toggle('active');
          navMenu.classList.toggle('active');
        });

        const navLinks = navMenu.querySelectorAll('a');
        navLinks.forEach(link => {
          link.addEventListener('click', function () {
            hamburger.classList.remove('active');
            navMenu.classList.remove('active');
          });
        });

        document.addEventListener('click', function (event) {
          if (!hamburger.contains(event.target) && !navMenu.contains(event.target)) {
            hamburger.classList.remove('active');
            navMenu.classList.remove('active');
          }
        });
      }

      // Fetch and display IP info
      fetch('https://api.ipify.org?format=json')
        .then(response => response.json())
        .then(data => {
          const mipEl = document.getElementById('mip');
          if (mipEl) {
            mipEl.textContent = 'Browser: ' + window.navigator.userAgent + ' | IP: ' + data.ip;
          }
        })
        .catch(error => console.log('IP fetch error:', error));

      // Update date and time
      function updateDateTime() {
        const dateTimeElement = document.getElementById('mdatetime');
        if (dateTimeElement) {
          const now = new Date();
          const status = navigator.onLine ? 'Connected' : 'Disconnected';
          dateTimeElement.textContent = now.toString() + ' | Internet Status: ' + status;
        }
      }
      
      updateDateTime();
      setInterval(updateDateTime, 1000);
    });
  </script>
</body>
</html>
